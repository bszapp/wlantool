name: Build prerelease APK

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wlantool-prerelease
  cancel-in-progress: true

env:
  NDK_VERSION: 27.2.12479018
  CMAKE_VERSION: 3.22.1
  RELEASE_TAG: prerelease

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: ""

      - name: Install Android SDK and native tools
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.1.0" \
            "ndk;$NDK_VERSION" \
            "cmake;$CMAKE_VERSION"
          sudo apt-get update -q
          sudo apt-get install -y curl make tar gzip unzip

      - name: Decode release signing key
        shell: bash
        env:
          WLANTOOL_RELEASE_KEYSTORE_BASE64: ${{ secrets.WLANTOOL_RELEASE_KEYSTORE_BASE64 }}
          WLANTOOL_RELEASE_STORE_PASSWORD: ${{ secrets.WLANTOOL_RELEASE_STORE_PASSWORD }}
          WLANTOOL_RELEASE_KEY_ALIAS: ${{ secrets.WLANTOOL_RELEASE_KEY_ALIAS }}
          WLANTOOL_RELEASE_KEY_PASSWORD: ${{ secrets.WLANTOOL_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          : "${WLANTOOL_RELEASE_KEYSTORE_BASE64:?Missing GitHub secret WLANTOOL_RELEASE_KEYSTORE_BASE64}"
          : "${WLANTOOL_RELEASE_STORE_PASSWORD:?Missing GitHub secret WLANTOOL_RELEASE_STORE_PASSWORD}"
          : "${WLANTOOL_RELEASE_KEY_ALIAS:?Missing GitHub secret WLANTOOL_RELEASE_KEY_ALIAS}"
          : "${WLANTOOL_RELEASE_KEY_PASSWORD:?Missing GitHub secret WLANTOOL_RELEASE_KEY_PASSWORD}"
          printf '%s' "$WLANTOOL_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/wlantool-release.p12"
          chmod 600 "$RUNNER_TEMP/wlantool-release.p12"

      - name: Build signed release APK with rootfs and native libraries
        shell: bash
        env:
          WLANTOOL_RELEASE_KEYSTORE: ${{ runner.temp }}/wlantool-release.p12
          WLANTOOL_RELEASE_STORE_PASSWORD: ${{ secrets.WLANTOOL_RELEASE_STORE_PASSWORD }}
          WLANTOOL_RELEASE_KEY_ALIAS: ${{ secrets.WLANTOOL_RELEASE_KEY_ALIAS }}
          WLANTOOL_RELEASE_KEY_PASSWORD: ${{ secrets.WLANTOOL_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          rm -f local.properties
          sed -i '/^android\.aapt2FromMavenOverride=/d' gradle.properties
          sh rftoolbuilder/downloads.sh
          sh rftoolbuilder/build.sh
          gradle --no-daemon :app:assembleRelease
          mkdir -p release
          cp app/build/outputs/apk/release/app-release.apk release/wlantool-release.apk
          ls -lh release/wlantool-release.apk

      - name: Publish prerelease
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release delete "$RELEASE_TAG" --yes --cleanup-tag || true
          gh release create "$RELEASE_TAG" \
            release/wlantool-release.apk \
            --target "$GITHUB_SHA" \
            --title "Prerelease" \
            --notes "Automated prerelease for $GITHUB_SHA" \
            --prerelease
