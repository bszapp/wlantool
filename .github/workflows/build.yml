name: Build and Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: ''

      - name: Install SDK platforms and NDK
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.1.0" \
            "ndk;27.2.12479018"

      - name: Install build tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y make

      - name: Set up NDK prefix for build.sh
        run: |
          NDK_PREBUILT=$ANDROID_SDK_ROOT/ndk/27.2.12479018/toolchains/llvm/prebuilt/linux-aarch64
          FAKE_PREFIX=/opt/ndk-prefix

          mkdir -p $FAKE_PREFIX/include $FAKE_PREFIX/lib

          ln -sfn $NDK_PREBUILT/sysroot/usr/include/aarch64-linux-android \
            $FAKE_PREFIX/include/aarch64-linux-android

          ln -sfn $NDK_PREBUILT/lib/clang \
            $FAKE_PREFIX/lib/clang

          echo "NDK_PREBUILT=$NDK_PREBUILT" >> $GITHUB_ENV
          echo "FAKE_PREFIX=$FAKE_PREFIX" >> $GITHUB_ENV

      - name: Cache distfiles
        uses: actions/cache@v4
        with:
          path: rftoolbuilder/distfiles
          key: distfiles-${{ hashFiles('rftoolbuilder/downloads.sh') }}
          restore-keys: distfiles-

      - name: Download distfiles
        run: |
          cd rftoolbuilder
          ./downloads.sh

      - name: Build native libs and rootfs
        run: |
          cd rftoolbuilder
          PREFIX=$FAKE_PREFIX \
          PATH=$NDK_PREBUILT/bin:$PATH \
          ./build.sh

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          files: app/build/outputs/apk/debug/app-debug.apk