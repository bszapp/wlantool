name: Build and Release

on:
  workflow_dispatch:

env:
  NDK_VERSION: 27.2.12479018
  CMAKE_VERSION: 3.22.1

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: ""

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.1.0" \
            "ndk;$NDK_VERSION" \
            "cmake;$CMAKE_VERSION"

      - name: Install native build tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y curl file make unzip

      - name: Sanitize local configuration
        run: |
          rm -f local.properties
          if [ -f gradle.properties ]; then
            sed -i '/^android\.aapt2FromMavenOverride=/d' gradle.properties
          fi

      - name: Verify tracked files contain no packaged binaries
        shell: bash
        run: |
          set -euo pipefail
          tracked_report=$(mktemp)
          git ls-files -z | xargs -0 file > "$tracked_report"
          if grep -E 'ELF|current ar archive|Zip archive data|gzip compressed data' "$tracked_report"; then
            echo "Tracked binary files are not allowed"
            exit 1
          fi

      - name: First clean build
        shell: bash
        run: |
          set -euo pipefail
          git clean -fdX
          sh rftoolbuilder/downloads.sh
          sh rftoolbuilder/build.sh
          gradle --no-daemon :app:assembleRelease
          test -s app/build/outputs/apk/release/app-release.apk

      - name: Retry after deleting all ignored files
        shell: bash
        run: |
          set -euo pipefail
          git clean -fdX
          sh rftoolbuilder/downloads.sh
          sh rftoolbuilder/build.sh
          gradle --no-daemon :app:assembleRelease
          test -s app/build/outputs/apk/release/app-release.apk

      - name: Collect release APK
        shell: bash
        run: |
          set -euo pipefail
          rm -rf release
          mkdir -p release
          cp app/build/outputs/apk/release/app-release.apk release/app-release.apk
          ls -lh release/app-release.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          files: release/app-release.apk
