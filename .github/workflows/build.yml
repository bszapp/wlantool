name: Build and Release

on:
  workflow_dispatch:

env:
  NDK_VERSION: 27.2.12479018

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: ''

      - name: Install Android SDK packages
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.1.0" \
            "ndk;$NDK_VERSION"

      - name: Install native build tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y curl make file unzip

      - name: Set up NDK sysroot for native build
        shell: bash
        run: |
          set -euo pipefail

          NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$NDK_VERSION"
          NDK_PREBUILT=$(find "$NDK_ROOT/toolchains/llvm/prebuilt" \
            -mindepth 1 -maxdepth 1 -type d | sort | head -n 1)
          test -n "$NDK_PREBUILT"
          test -x "$NDK_PREBUILT/bin/clang"

          ANDROID_SYSROOT="$NDK_PREBUILT/sysroot"
          test -f "$ANDROID_SYSROOT/usr/include/linux/limits.h"
          test -f "$ANDROID_SYSROOT/usr/include/aarch64-linux-android/asm/unistd.h"

          FAKE_PREFIX=/opt/ndk-prefix
          sudo rm -rf "$FAKE_PREFIX"
          sudo mkdir -p "$FAKE_PREFIX" "$FAKE_PREFIX/lib"
          sudo ln -s "$ANDROID_SYSROOT/usr/include" "$FAKE_PREFIX/include"
          sudo ln -s "$NDK_PREBUILT/lib/clang" "$FAKE_PREFIX/lib/clang"

          echo "ANDROID_NDK_ROOT=$NDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_SYSROOT=$ANDROID_SYSROOT" >> "$GITHUB_ENV"
          echo "NDK_PREBUILT=$NDK_PREBUILT" >> "$GITHUB_ENV"
          echo "FAKE_PREFIX=$FAKE_PREFIX" >> "$GITHUB_ENV"

      - name: Cache native distfiles
        uses: actions/cache@v4
        with:
          path: rftoolbuilder/distfiles
          key: distfiles-${{ hashFiles('rftoolbuilder/downloads.sh') }}
          restore-keys: distfiles-

      - name: Download native distfiles
        run: |
          chmod +x rftoolbuilder/*.sh
          cd rftoolbuilder
          ./downloads.sh

      - name: Build and embed rootfs/native libraries
        shell: bash
        run: |
          set -euo pipefail
          cd rftoolbuilder
          PREFIX="$FAKE_PREFIX" \
          ANDROID_NDK_ROOT="$ANDROID_NDK_ROOT" \
          ANDROID_SYSROOT="$ANDROID_SYSROOT" \
          NDK_PREBUILT="$NDK_PREBUILT" \
          PATH="$NDK_PREBUILT/bin:$PATH" \
          ./build.sh

          cd ..
          test -s app/src/main/assets/rootfs.tar.gz
          test -s app/src/main/jniLibs/arm64-v8a/librftool.so
          test -s app/src/main/jniLibs/arm64-v8a/libproot.so
          test -s app/src/main/jniLibs/arm64-v8a/libproot-loader.so
          ls -lh app/src/main/assets/rootfs.tar.gz app/src/main/jniLibs/arm64-v8a/*.so

      - name: Sanitize Android local configuration
        shell: bash
        run: |
          set -euo pipefail
          rm -f local.properties
          if [ -f gradle.properties ]; then
            sed -i '/^android\.aapt2FromMavenOverride=/d' gradle.properties
          fi

      - name: Build app-release APK
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon :app:assembleRelease

      - name: Collect app-release APK
        shell: bash
        run: |
          set -euo pipefail
          rm -rf release
          mkdir -p release
          cp app/build/outputs/apk/release/app-release.apk release/app-release.apk
          ls -lh release/app-release.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          files: release/app-release.apk
