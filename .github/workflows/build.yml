name: Build and Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: ''

      - name: Install Android SDK packages
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.1.0"

      - name: Sanitize Android local configuration
        shell: bash
        run: |
          set -euo pipefail
          rm -f local.properties
          if [ -f gradle.properties ]; then
            sed -i '/^android\.aapt2FromMavenOverride=/d' gradle.properties
          fi

      - name: Build app release APK
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon :app:assembleRelease

      - name: Collect app-release APK
        shell: bash
        run: |
          set -euo pipefail
          rm -rf release
          mkdir -p release
          mapfile -t apks < <(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' | sort)
          if [ "${#apks[@]}" -ne 1 ]; then
            printf 'Expected exactly one release APK, found %s:\n' "${#apks[@]}" >&2
            printf '%s\n' "${apks[@]}" >&2
            exit 1
          fi
          cp "${apks[0]}" release/app-release.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          files: release/app-release.apk
